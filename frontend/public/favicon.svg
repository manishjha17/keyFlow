<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 100 100" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Solid background to ensure visibility on light tabs -->
  <rect x="0" y="10" width="100" height="80" rx="12" fill="#1a1a1a" stroke="none" />
  
  <!-- Keyboard Base -->
  <rect x="10" y="20" width="80" height="60" rx="8" stroke="#ffffff" />
  
  <!-- Top row generic keys line -->
  <line x1="20" y1="40" x2="80" y2="40" stroke="#ffffff" stroke-dasharray="10 10" />
  
  <!-- Spacebar -->
  <rect x="30" y="55" width="40" height="12" rx="4" stroke="#ffffff" />
</svg>